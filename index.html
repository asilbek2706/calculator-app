<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./style/variable.css" />
    <link rel="stylesheet" href="./style/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:wght@549&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="container">
    <!-- Display -->
    <div class="display">
      <h2 class="primary__number">0123</h2>
      <h3 class="secondary__number"></h3>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <button class="button">C</button>
      <button class="button">+ / -</button>
      <button class="button">%</button>
      <button class="button">/</button>

      <button class="button">7</button>
      <button class="button">8</button>
      <button class="button">9</button>
      <button class="button">*</button>

      <button class="button">4</button>
      <button class="button">5</button>
      <button class="button">6</button>
      <button class="button">-</button>

      <button class="button">1</button>
      <button class="button">2</button>
      <button class="button">3</button>
      <button class="button">+</button>

      <button class="button">0</button>
      <button class="button">.</button>
      <button class="button">B</button>
      <button class="button">=</button>
    </div>
    <script src="./javascript/script.js"></script>
  </body>
</html>
